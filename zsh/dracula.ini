; Dracula Theme (256-color version) for fast-syntax-highlighting
; Simplified to 256 color IDs for maximum compatibility

[base]
default          = 255
unknown-token    = 203,bold
commandseparator = 212
redirection      = 255
here-string-tri  = 212
here-string-text = 228
here-string-var  = 117
exec-descriptor  = 215,bold
comment          = 61
correct-subtle   = 84
incorrect-subtle = 203
subtle-separator = 255
subtle-bg        = 
secondary        = 
recursive-base   = 

[command-point]
reserved-word  = 117
subcommand     = 84
alias          = 84
suffix-alias   = 84
global-alias   = 84
builtin        = 117
function       = 84
command        = 84
precommand     = 84
hashed-command = 117
single-sq-bracket = 255
double-sq-bracket = 255
double-paren      = 255

[paths]
path          = 255
pathseparator = 212
path-to-dir   = 255,underline
globbing      = 141,bold
globbing-ext  = 141

[brackets]
paired-bracket = bg:236
bracket-level-1 = 84,bold
bracket-level-2 = 228,bold
bracket-level-3 = 141,bold

[arguments]
single-hyphen-option   = 215
double-hyphen-option   = 215
back-quoted-argument   = 141
single-quoted-argument = 228
double-quoted-argument = 228
dollar-quoted-argument = 228

[in-string]
; backslash in $'...'
back-dollar-quoted-argument           = 212
; backslash or $... in "..."
back-or-dollar-double-quoted-argument = 212

[other]
variable             = 255
assign               = 255
assign-array-bracket = 255
history-expansion    = 141,bold

[math]
mathvar = 117,bold
mathnum = 141
matherr = 203

[for-loop]
forvar = 255
fornum = 141
; operator
foroper = 212
; separator
forsep = 212,bold

[case]
case-input        = 84
case-parentheses  = 212
case-condition    = 117
