; Kurama Theme (256-color, muted edition) for fast-syntax-highlighting
; Softer, darker tones while preserving the original palette balance

[base]
default          = 251
unknown-token    = 167,bold
commandseparator = 139
redirection      = 251
here-string-tri  = 139
here-string-text = 187
here-string-var  = 110
exec-descriptor  = 173,bold
comment          = 60
correct-subtle   = 72
incorrect-subtle = 167
subtle-separator = 245
subtle-bg        =
secondary        =
recursive-base   =

[command-point]
reserved-word     = 110
subcommand        = 72
alias             = 72
suffix-alias      = 72
global-alias      = 72
builtin           = 110
function          = 72
command           = 72
precommand        = 72
hashed-command    = 110
single-sq-bracket = 251
double-sq-bracket = 251
double-paren      = 251

[paths]
path          = 251
pathseparator = 139
path-to-dir   = 250,underline
globbing      = 103,bold
globbing-ext  = 103

[brackets]
paired-bracket = bg:236
bracket-level-1 = 72,bold
bracket-level-2 = 187,bold
bracket-level-3 = 103,bold

[arguments]
single-hyphen-option   = 173
double-hyphen-option   = 173
back-quoted-argument   = 103
single-quoted-argument = 187
double-quoted-argument = 187
dollar-quoted-argument = 187

[in-string]
back-dollar-quoted-argument           = 139
back-or-dollar-double-quoted-argument = 139

[other]
variable             = 251
assign               = 251
assign-array-bracket = 251
history-expansion    = 103,bold

[math]
mathvar = 110,bold
mathnum = 103
matherr = 167

[for-loop]
forvar  = 251
fornum  = 103
foroper = 139
forsep  = 139,bold

[case]
case-input       = 72
case-parentheses = 139
case-condition   = 110
